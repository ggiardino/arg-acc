name: ar-acc CI

# Tests del scaffold de adaptación argentina (directorio aracc/).
on:
  push:
    paths:
      - "aracc/**"
      - ".github/workflows/aracc-ci.yml"
  pull_request:
    paths:
      - "aracc/**"
      - ".github/workflows/aracc-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: aracc
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install aracc_etl + dev deps
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - name: Verify CLI entrypoint
        run: aracc-etl list
