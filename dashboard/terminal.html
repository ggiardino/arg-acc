<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ar-acc :: terminal de inconsistencias</title>
<style>
  :root {
    --bg:#0a0e0a; --panel:#0f140f; --fg:#9af09a; --dim:#4f7a4f;
    --amber:#f0c040; --red:#ff6b5e; --cyan:#5ad7f0; --line:#1c2a1c;
    --sel:#143014;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body {
    background:var(--bg); color:var(--fg);
    font-family:"JetBrains Mono","Cascadia Code",Consolas,Menlo,monospace;
    font-size:13.5px; line-height:1.5; display:flex; flex-direction:column;
    height:100vh; overflow:hidden;
  }
  a { color:var(--cyan); }
  header {
    border-bottom:1px solid var(--line); padding:8px 14px;
    display:flex; justify-content:space-between; align-items:baseline; gap:12px;
  }
  header .brand { color:var(--amber); font-weight:700; letter-spacing:.5px; }
  header .links a { margin-left:14px; font-size:12px; }
  .disclaimer {
    background:#1a1405; color:var(--amber); border-bottom:1px solid var(--line);
    padding:4px 14px; font-size:11.5px;
  }
  .pathbar { padding:6px 14px; border-bottom:1px solid var(--line);
             color:var(--dim); white-space:nowrap; overflow-x:auto; }
  .pathbar b { color:var(--fg); }
  main { flex:1; display:flex; min-height:0; }
  .pane { overflow-y:auto; padding:10px 14px; }
  #entries { flex:1.1; border-right:1px solid var(--line); }
  #detail { flex:1; }
  @media (max-width:760px){
    main { flex-direction:column; }
    #entries { border-right:none; border-bottom:1px solid var(--line); flex:none;
               max-height:46vh; }
  }
  .sectitle { color:var(--amber); margin:0 0 8px; font-size:12px;
              text-transform:uppercase; letter-spacing:1px; }
  .note { color:var(--dim); font-size:12px; margin:0 0 10px;
          border-left:2px solid var(--line); padding-left:8px; }
  .entry {
    display:flex; align-items:baseline; gap:8px; padding:3px 6px;
    cursor:pointer; border:1px solid transparent; border-radius:3px;
  }
  .entry:hover { background:#101810; }
  .entry.sel { background:var(--sel); border-color:#2c5c2c; }
  .entry .idx { color:var(--dim); width:30px; flex:none; }
  .entry .lbl { color:var(--fg); }
  .entry .sub { color:var(--dim); font-size:12px; }
  .entry.item { cursor:default; }
  .entry.item:hover { background:transparent; }
  .entry .arrow { color:var(--dim); }
  .badge {
    margin-left:auto; flex:none; font-size:11px; padding:0 6px;
    border:1px solid var(--line); border-radius:9px; color:var(--dim);
  }
  .badge.warn { color:var(--amber); border-color:#43370f; }
  .badge.alta { color:var(--red); border-color:#4a1f1c; }
  .badge.medi { color:var(--amber); border-color:#43370f; }
  .badge.baja { color:var(--cyan); border-color:#1c3a43; }
  .row { display:flex; gap:10px; padding:2px 0; border-bottom:1px dotted #142014; }
  .row .k { color:var(--dim); flex:none; width:190px; }
  .row .v { color:var(--fg); word-break:break-word; }
  .signal {
    border:1px solid var(--line); border-left-width:3px; border-radius:4px;
    padding:8px 10px; margin:10px 0; background:var(--panel);
  }
  .signal.alta { border-left-color:var(--red); }
  .signal.media { border-left-color:var(--amber); }
  .signal.baja { border-left-color:var(--cyan); }
  .signal h4 { margin:0 0 4px; font-size:13px; }
  .signal.alta h4 { color:var(--red); }
  .signal.media h4 { color:var(--amber); }
  .signal.baja h4 { color:var(--cyan); }
  .signal .det { color:var(--fg); font-size:12.5px; margin-bottom:5px; }
  .signal ul { margin:4px 0 0; padding-left:18px; color:var(--dim);
               font-size:12px; }
  .signal .src { font-size:11px; color:var(--dim); margin-top:5px; }
  .err { color:var(--red); }
  footer { border-top:1px solid var(--line); padding:6px 14px; }
  .cmdline { display:flex; align-items:center; gap:8px; }
  .cmdline .ps { color:var(--amber); flex:none; }
  #cmd {
    flex:1; background:transparent; border:none; outline:none;
    color:var(--fg); font:inherit; caret-color:var(--amber);
  }
  #log { color:var(--dim); font-size:11.5px; min-height:15px; margin-top:3px; }
  #log.bad { color:var(--red); }
  ::-webkit-scrollbar { width:9px; height:9px; }
  ::-webkit-scrollbar-thumb { background:#1c2a1c; }
</style>
</head>
<body>
  <header>
    <span class="brand">ar-acc :: terminal de inconsistencias</span>
    <span class="links">
      <a href="/dashboard">dashboard</a>
      <a href="/">chat IA</a>
    </span>
  </header>
  <div class="disclaimer">
    Cada hallazgo es una HIPÓTESIS a verificar contra la fuente oficial citada.
    No constituye prueba ni imputación. Rige la presunción de inocencia.
  </div>
  <div class="pathbar" id="pathbar">~</div>
  <main>
    <section class="pane" id="entries"></section>
    <section class="pane" id="detail"></section>
  </main>
  <footer>
    <div class="cmdline">
      <span class="ps">ar-acc&nbsp;$</span>
      <input id="cmd" autocomplete="off" spellcheck="false"
             placeholder="comandos: ls · cd N · cd .. · find TEXTO · help" />
    </div>
    <div id="log">↑/↓ moverse · Enter abrir · ← subir · escribí un comando y Enter</div>
  </footer>

<script>
const API = "/api/dashboard";
const state = { path: "/", sel: 0, view: null };
const $ = (id) => document.getElementById(id);

function parent(path) {
  if (!path || path === "/") return "/";
  const p = path.replace(/\/+$/, "").split("/");
  p.pop();
  return p.join("/") || "/";
}

function navEntries() {
  return (state.view ? state.view.entries : []).filter((e) => e.path);
}

async function load(path) {
  setLog("cargando " + path + " ...");
  try {
    const r = await fetch(API + "/ls?path=" + encodeURIComponent(path));
    const view = await r.json();
    state.path = view.path || path;
    state.view = view;
    state.sel = 0;
    render();
    setLog(view.kind === "error" ? view.note || "error" : "ok",
           view.kind === "error");
  } catch (err) {
    setLog("error de red: " + err, true);
  }
}

function setLog(msg, bad) {
  const el = $("log");
  el.textContent = msg;
  el.className = bad ? "bad" : "";
}

function render() {
  const v = state.view;
  if (!v) return;

  const segs = state.path.replace(/^\/+|\/+$/g, "").split("/").filter(Boolean);
  let crumb = "<b>~</b>", acc = "";
  for (const s of segs) { acc += "/" + s; crumb += " / <b>" + s + "</b>"; }
  $("pathbar").innerHTML = crumb + "&nbsp;&nbsp;:: " + (v.title || "");

  // ---- panel izquierdo: entradas ----
  const E = $("entries");
  let h = "<p class='sectitle'>" + (v.title || "") + "</p>";
  if (v.note) h += "<p class='note'>" + esc(v.note) + "</p>";
  if (!v.entries.length) {
    h += "<p class='note'>(sin elementos)</p>";
  }
  v.entries.forEach((e, i) => {
    const cls = "entry " + (e.kind === "item" ? "item " : "") +
                (i === state.sel ? "sel" : "");
    const badge = e.badge ? badgeHtml(e.badge) : "";
    const arrow = e.path && e.kind !== "item" ? "<span class='arrow'>›</span>" : "";
    h += "<div class='" + cls + "' data-i='" + i + "'>" +
         "<span class='idx'>" + String(i + 1).padStart(2, "0") + "</span>" +
         "<span><span class='lbl'>" + esc(e.label) + "</span> " + arrow +
         "<br><span class='sub'>" + esc(e.sublabel || "") + "</span></span>" +
         badge + "</div>";
  });
  E.innerHTML = h;
  E.querySelectorAll(".entry").forEach((node) => {
    node.onclick = () => {
      const i = +node.dataset.i;
      state.sel = i;
      render();
      const e = v.entries[i];
      if (e && e.path && e.kind !== "item") load(e.path);
    };
  });
  const sel = E.querySelector(".entry.sel");
  if (sel) sel.scrollIntoView({ block: "nearest" });

  // ---- panel derecho: detalle + señales ----
  const D = $("detail");
  let d = "";
  if (v.detail && v.detail.length) {
    d += "<p class='sectitle'>Detalle</p>";
    v.detail.forEach((r) => {
      d += "<div class='row'><span class='k'>" + esc(r.label) +
           "</span><span class='v'>" + esc(r.value) + "</span></div>";
    });
  }
  if (v.signals && v.signals.length) {
    d += "<p class='sectitle' style='margin-top:14px'>Señales de riesgo (" +
         v.signals.length + ")</p>";
    v.signals.forEach((s) => {
      d += "<div class='signal " + s.severidad + "'>" +
           "<h4>[" + s.severidad.toUpperCase() + "] " + esc(s.titulo) + "</h4>" +
           "<div class='det'>" + esc(s.detalle) + "</div>";
      if (s.evidencia && s.evidencia.length) {
        d += "<ul>";
        s.evidencia.forEach((x) => { d += "<li>" + esc(x) + "</li>"; });
        d += "</ul>";
      }
      if (s.fuente) {
        d += "<div class='src'>Fuente: <a href='" + esc(s.fuente) +
             "' target='_blank' rel='noopener'>" + esc(s.fuente) + "</a></div>";
      }
      d += "</div>";
    });
  }
  if (!d) {
    d = "<p class='note'>Elegí un elemento de la izquierda para ver su " +
        "detalle. Usá ↑/↓ y Enter, o el comando <b>cd N</b>.</p>";
  }
  D.innerHTML = d;
}

function badgeHtml(b) {
  let cls = "badge";
  const low = b.toLowerCase();
  if (b.startsWith("⚠")) cls += " warn";
  else if (low.startsWith("alta")) cls += " alta";
  else if (low.startsWith("medi")) cls += " medi";
  else if (low.startsWith("baja")) cls += " baja";
  return "<span class='" + cls + "'>" + esc(b) + "</span>";
}

function esc(s) {
  return String(s == null ? "" : s).replace(/[&<>"]/g, (c) => (
    { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}

function descend() {
  const e = (state.view && state.view.entries[state.sel]) || null;
  if (e && e.path && e.kind !== "item") load(e.path);
  else setLog("ese elemento no es navegable", true);
}

function runCmd(raw) {
  const line = raw.trim();
  if (!line) { descend(); return; }
  const [cmd, ...rest] = line.split(/\s+/);
  const arg = rest.join(" ");
  const v = state.view;
  switch (cmd) {
    case "ls": load(state.path); break;
    case "cd":
    case "open": {
      if (arg === ".." ) { load(parent(state.path)); break; }
      if (arg === "/" || arg === "~") { load("/"); break; }
      const n = parseInt(arg, 10);
      if (!isNaN(n) && v && v.entries[n - 1]) {
        const e = v.entries[n - 1];
        if (e.path && e.kind !== "item") load(e.path);
        else setLog("[" + n + "] no es navegable", true);
      } else if (v) {
        const e = v.entries.find((x) =>
          x.path && (x.key === arg ||
            x.label.toLowerCase().includes(arg.toLowerCase())));
        if (e) load(e.path); else setLog("no encontrado: " + arg, true);
      }
      break;
    }
    case "find":
      if (arg) searchAfter(arg);
      else setLog("uso: find TEXTO", true);
      break;
    case "help": showHelp(); break;
    case "clear": setLog(""); break;
    case "root": case "~": load("/"); break;
    default: setLog("comando desconocido: " + cmd + " (probá 'help')", true);
  }
}

async function searchAfter(q) {
  setLog("buscando «" + q + "» ...");
  try {
    const r = await fetch(API + "/search?q=" + encodeURIComponent(q));
    const view = await r.json();
    state.path = "/personas"; state.view = view; state.sel = 0;
    render();
    setLog(view.entries.length + " resultado(s) para «" + q + "»");
  } catch (err) { setLog("error: " + err, true); }
}

function showHelp() {
  state.view = {
    path: state.path, title: "Ayuda", kind: "vista", entries: [],
    detail: [
      { label: "ls", value: "vuelve a listar la sección actual" },
      { label: "cd N", value: "entra al elemento número N" },
      { label: "cd ..", value: "sube un nivel" },
      { label: "cd / | root", value: "vuelve a la raíz" },
      { label: "find TEXTO", value: "busca un funcionario por nombre o CUIL" },
      { label: "↑ / ↓", value: "mueve la selección" },
      { label: "Enter / →", value: "abre el elemento seleccionado" },
      { label: "← / Backspace", value: "sube un nivel (con el comando vacío)" },
    ],
    signals: [],
    note: "Secciones: organismos · personas · inconsistencias. " +
          "El motor detecta saltos patrimoniales, descuadres internos, " +
          "funcionarios-proveedores, años faltantes y rectificativas.",
  };
  render();
  setLog("ayuda — escribí un comando para continuar");
}

document.addEventListener("keydown", (ev) => {
  const input = $("cmd");
  const empty = input.value === "";
  if (ev.key === "ArrowDown") {
    ev.preventDefault();
    state.sel = Math.min(state.sel + 1,
      Math.max(0, (state.view ? state.view.entries.length : 1) - 1));
    render();
  } else if (ev.key === "ArrowUp") {
    ev.preventDefault();
    state.sel = Math.max(0, state.sel - 1);
    render();
  } else if (ev.key === "Enter") {
    ev.preventDefault();
    runCmd(input.value);
    input.value = "";
  } else if ((ev.key === "ArrowRight") && empty) {
    ev.preventDefault(); descend();
  } else if ((ev.key === "ArrowLeft" ||
              (ev.key === "Backspace" && empty))) {
    if (empty) { ev.preventDefault(); load(parent(state.path)); }
  }
});

$("cmd").addEventListener("blur", () => setTimeout(() => $("cmd").focus(), 0));
$("cmd").focus();
load("/");
</script>
</body>
</html>
